server {
    listen 80;

    # ── FRONTEND ──────────────────────────────────────────
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # ── BACKEND API (regular) ─────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── STREAMING ENDPOINTS (SSE) ─────────────────────────
    # Penting: buffering HARUS off untuk streaming
    location /api/ask/stream {
        proxy_pass http://backend:8000/ask/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;           # ← KUNCI streaming
        proxy_cache off;
        proxy_read_timeout 300s;

        # SSE headers
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }

    location /api/summarize/stream {
        proxy_pass http://backend:8000/summarize/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;
    }
}